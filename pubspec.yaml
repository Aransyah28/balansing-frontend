name: balansing
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.15.0
  google_sign_in: ^7.2.0
  google_fonts: ^8.1.0
  http: ^1.2.1
  provider: ^6.1.2
  image_picker: ^1.1.2
  fl_chart: ^1.2.0
  permission_handler: ^12.0.3
  path_provider: ^2.1.3
  avatar_glow: ^3.0.1
  audioplayers: ^6.0.0
  camera: ^0.12.0+1
  video_player: ^2.9.1
  image_gallery_saver_plus: ^5.0.0
  device_info_plus: ^13.1.0
  dio: ^5.9.2
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  flutter_markdown_plus: ^1.0.7
  flutter_dotenv: ^6.0.1
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.14.4"
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
     - assets/images/
     - .env

flutter_launcher_icons:
  image_path: "assets/images/Balansing-Logo.png" 
  android: true
  ios: true
  adaptive_icon_background: "#FFFFFF"
